<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" role="img" aria-label="Canada's $1.9B RWA Infrastructure TAM - Five-Layer Revenue Stack">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0d12"/>
      <stop offset="1" stop-color="#13181f"/>
    </linearGradient>
    <linearGradient id="goldHi" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d4a85a"/>
      <stop offset="1" stop-color="#b88a3a"/>
    </linearGradient>
    <linearGradient id="goldLo" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5a4623"/>
      <stop offset="1" stop-color="#3d301a"/>
    </linearGradient>
  </defs>

  <rect width="880" height="520" fill="url(#bg)"/>

  <!-- Header -->
  <text x="48" y="56" fill="#d4a85a" font-family="Georgia, 'Times New Roman', serif" font-size="11" letter-spacing="3">KCS RESEARCH · MARKET & TAM</text>
  <text x="48" y="92" fill="#f4ecdb" font-family="Georgia, serif" font-size="26" font-weight="500">Canada's RWA Infrastructure Revenue Stack</text>
  <text x="48" y="118" fill="#8a8676" font-family="Georgia, serif" font-size="14" font-style="italic">Annual revenue pool by 2030 · Bottom-up bands · C$ millions</text>

  <!-- Divider -->
  <line x1="48" y1="138" x2="832" y2="138" stroke="#2a2f38" stroke-width="1"/>

  <!-- Axis -->
  <line x1="280" y1="160" x2="280" y2="460" stroke="#2a2f38" stroke-width="1"/>
  <line x1="280" y1="460" x2="820" y2="460" stroke="#2a2f38" stroke-width="1"/>

  <!-- X-axis labels -->
  <text x="280" y="478" fill="#6a6557" font-family="Georgia, serif" font-size="10">0</text>
  <text x="415" y="478" fill="#6a6557" font-family="Georgia, serif" font-size="10">200</text>
  <text x="550" y="478" fill="#6a6557" font-family="Georgia, serif" font-size="10">400</text>
  <text x="685" y="478" fill="#6a6557" font-family="Georgia, serif" font-size="10">600</text>
  <text x="820" y="478" fill="#6a6557" font-family="Georgia, serif" font-size="10">800</text>
  <text x="540" y="498" fill="#8a8676" font-family="Georgia, serif" font-size="11" text-anchor="middle">C$ millions per year (2030)</text>

  <!-- bar scale: 1 C$M = 0.675 px ; from x=280 -->
  <!-- Settlement: 95 - 520 -->
  <g>
    <rect x="343.13" y="178" width="286.88" height="32" fill="url(#goldLo)" opacity="0.55"/>
    <rect x="343.13" y="178" width="64.12" height="32" fill="url(#goldHi)"/>
    <text x="270" y="199" fill="#f4ecdb" font-family="Georgia, serif" font-size="14" text-anchor="end">Settlement</text>
    <text x="640" y="199" fill="#d4a85a" font-family="Georgia, serif" font-size="12">$95M - $520M</text>
  </g>

  <!-- Issuance: 45 - 160 -->
  <g>
    <rect x="310.38" y="226" width="77.62" height="32" fill="url(#goldLo)" opacity="0.55"/>
    <rect x="310.38" y="226" width="30.38" height="32" fill="url(#goldHi)"/>
    <text x="270" y="247" fill="#f4ecdb" font-family="Georgia, serif" font-size="14" text-anchor="end">Issuance</text>
    <text x="398" y="247" fill="#d4a85a" font-family="Georgia, serif" font-size="12">$45M - $160M</text>
  </g>

  <!-- Custody: 60 - 380 -->
  <g>
    <rect x="320.5" y="274" width="216" height="32" fill="url(#goldLo)" opacity="0.55"/>
    <rect x="320.5" y="274" width="40.5" height="32" fill="url(#goldHi)"/>
    <text x="270" y="295" fill="#f4ecdb" font-family="Georgia, serif" font-size="14" text-anchor="end">Custody</text>
    <text x="546" y="295" fill="#d4a85a" font-family="Georgia, serif" font-size="12">$60M - $380M</text>
  </g>

  <!-- Marketplace: 25 - 220 -->
  <g>
    <rect x="296.88" y="322" width="131.62" height="32" fill="url(#goldLo)" opacity="0.55"/>
    <rect x="296.88" y="322" width="16.88" height="32" fill="url(#goldHi)"/>
    <text x="270" y="343" fill="#f4ecdb" font-family="Georgia, serif" font-size="14" text-anchor="end">Marketplace</text>
    <text x="438" y="343" fill="#d4a85a" font-family="Georgia, serif" font-size="12">$25M - $220M</text>
  </g>

  <!-- Repatriation: 125 - 620 -->
  <g>
    <rect x="364.38" y="370" width="333.75" height="32" fill="url(#goldLo)" opacity="0.55"/>
    <rect x="364.38" y="370" width="84.38" height="32" fill="url(#goldHi)"/>
    <text x="270" y="391" fill="#f4ecdb" font-family="Georgia, serif" font-size="14" text-anchor="end">Repatriation</text>
    <text x="708" y="391" fill="#d4a85a" font-family="Georgia, serif" font-size="12">$125M - $620M</text>
  </g>

  <!-- Total -->
  <line x1="280" y1="424" x2="820" y2="424" stroke="#2a2f38" stroke-width="1"/>
  <text x="270" y="446" fill="#f4ecdb" font-family="Georgia, serif" font-size="14" font-weight="600" text-anchor="end">Total annual pool</text>
  <text x="343" y="446" fill="#d4a85a" font-family="Georgia, serif" font-size="14" font-weight="600">$350M - $1,900M</text>

  <!-- Legend -->
  <g transform="translate(48, 175)">
    <rect width="14" height="14" fill="url(#goldHi)"/>
    <text x="22" y="11" fill="#8a8676" font-family="Georgia, serif" font-size="11">Base case</text>
    <rect y="22" width="14" height="14" fill="url(#goldLo)" opacity="0.55"/>
    <text x="22" y="33" fill="#8a8676" font-family="Georgia, serif" font-size="11">Upside case</text>
  </g>

  <!-- Footer -->
  <text x="48" y="500" fill="#5a5648" font-family="Georgia, serif" font-size="10">Source: 4orm Master Pro Forma · McKinsey · BCG · PwC · KPMG · Bank of Canada · KCS Capital, May 2026</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 560" role="img" aria-label="CIRO Digital Asset Custody Framework — Three-entity separation">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0d12"/>
      <stop offset="1" stop-color="#13181f"/>
    </linearGradient>
    <linearGradient id="gold3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d4a85a"/>
      <stop offset="1" stop-color="#b88a3a"/>
    </linearGradient>
  </defs>

  <rect width="880" height="560" fill="url(#bg3)"/>

  <text x="48" y="56" fill="#d4a85a" font-family="Georgia, serif" font-size="11" letter-spacing="3">KCS RESEARCH · REGULATORY</text>
  <text x="48" y="92" fill="#f4ecdb" font-family="Georgia, serif" font-size="26" font-weight="500">CIRO Custody Framework · Three-Entity Separation</text>
  <text x="48" y="118" fill="#8a8676" font-family="Georgia, serif" font-size="14" font-style="italic">February 2026 · The structural model 4orm Finance is built on</text>

  <line x1="48" y1="138" x2="832" y2="138" stroke="#2a2f38" stroke-width="1"/>

  <!-- HoldCo -->
  <g transform="translate(330, 170)">
    <rect width="220" height="80" fill="none" stroke="url(#gold3)" stroke-width="1.5"/>
    <text x="110" y="32" fill="#d4a85a" font-family="Georgia, serif" font-size="11" text-anchor="middle" letter-spacing="3">HOLDCO</text>
    <text x="110" y="54" fill="#f4ecdb" font-family="Georgia, serif" font-size="14" text-anchor="middle">Parent Holding Entity</text>
    <text x="110" y="70" fill="#8a8676" font-family="Georgia, serif" font-size="11" text-anchor="middle">Owns platform · Capitalizes opcos</text>
  </g>

  <!-- Connectors down -->
  <line x1="380" y1="250" x2="180" y2="300" stroke="#2a2f38" stroke-width="1"/>
  <line x1="500" y1="250" x2="700" y2="300" stroke="#2a2f38" stroke-width="1"/>

  <!-- OpCo -->
  <g transform="translate(90, 300)">
    <rect width="220" height="160" fill="none" stroke="url(#gold3)" stroke-width="1.5"/>
    <text x="110" y="32" fill="#d4a85a" font-family="Georgia, serif" font-size="11" text-anchor="middle" letter-spacing="3">OPCO</text>
    <text x="110" y="54" fill="#f4ecdb" font-family="Georgia, serif" font-size="14" text-anchor="middle">Operating Entity</text>
    <line x1="20" y1="68" x2="200" y2="68" stroke="#2a2f38"/>
    <text x="110" y="88" fill="#8a8676" font-family="Georgia, serif" font-size="11" text-anchor="middle">Technology platform</text>
    <text x="110" y="106" fill="#8a8676" font-family="Georgia, serif" font-size="11" text-anchor="middle">Marketplace functions</text>
    <text x="110" y="124" fill="#8a8676" font-family="Georgia, serif" font-size="11" text-anchor="middle">CIRO marketplace</text>
    <text x="110" y="142" fill="#8a8676" font-family="Georgia, serif" font-size="11" text-anchor="middle">+ dealer permission</text>
  </g>

  <!-- CustodyCo -->
  <g transform="translate(570, 300)">
    <rect width="220" height="160" fill="url(#gold3)" opacity="0.08"/>
    <rect width="220" height="160" fill="none" stroke="url(#gold3)" stroke-width="2"/>
    <text x="110" y="32" fill="#d4a85a" font-family="Georgia, serif" font-size="11" text-anchor="middle" letter-spacing="3">CUSTODYCO</text>
    <text x="110" y="54" fill="#f4ecdb" font-family="Georgia, serif" font-size="14" text-anchor="middle">Custody Entity</text>
    <line x1="20" y1="68" x2="200" y2="68" stroke="#2a2f38"/>
    <text x="110" y="88" fill="#8a8676" font-family="Georgia, serif" font-size="11" text-anchor="middle">Qualified Cdn digital</text>
    <text x="110" y="106" fill="#8a8676" font-family="Georgia, serif" font-size="11" text-anchor="middle">custodian permission</text>
    <text x="110" y="124" fill="#8a8676" font-family="Georgia, serif" font-size="11" text-anchor="middle">Holds client assets</text>
    <text x="110" y="142" fill="#8a8676" font-family="Georgia, serif" font-size="11" text-anchor="middle">Segregated · audited</text>
  </g>

  <!-- The Wall - separation -->
  <line x1="440" y1="290" x2="440" y2="470" stroke="#d4a85a" stroke-width="0.5" stroke-dasharray="2 4" opacity="0.6"/>
  <text x="440" y="487" fill="#d4a85a" font-family="Georgia, serif" font-size="9" text-anchor="middle" letter-spacing="2" opacity="0.7">SEPARATION</text>

  <!-- Five pillars -->
  <text x="48" y="514" fill="#d4a85a" font-family="Georgia, serif" font-size="11" letter-spacing="2">FIVE FRAMEWORK ELEMENTS</text>
  <g font-family="Georgia, serif" fill="#f4ecdb" font-size="11">
    <text x="48" y="538">01 · Three-entity separation</text>
    <text x="220" y="538">02 · Tiered capital</text>
    <text x="372" y="538">03 · Weekly proof-of-reserves</text>
    <text x="560" y="538">04 · Segregation at tx layer</text>
    <text x="720" y="538">05 · CIRO permissioning</text>
  </g>
</svg>

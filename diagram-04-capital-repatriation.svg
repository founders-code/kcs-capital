  <!-- Leak arrow -->
  <path d="M 260 220 Q 440 220 620 220" stroke="url(#leak)" stroke-width="14" fill="none" opacity="0.7"/>
  <polygon points="615,213 630,220 615,227" fill="#d4a85a" opacity="0.5"/>
  <text x="440" y="208" fill="#d4a85a" font-family="Georgia, serif" font-size="12" text-anchor="middle" font-style="italic">$20B-$40B GTV · $80M-$220M fee leak</text>

  <!-- Recovery arrow -->
  <path d="M 620 355 Q 440 355 260 355" stroke="url(#recover)" stroke-width="14" fill="none" opacity="0.85"/>
  <polygon points="265,348 250,355 265,362" fill="#d4a85a"/>
  <text x="440" y="378" fill="#d4a85a" font-family="Georgia, serif" font-size="12" text-anchor="middle" font-style="italic">$400M-$2.0B forward recoverable pool · 2026-2030</text>

  <!-- Footer -->
  <text x="48" y="450" fill="#d4a85a" font-family="Georgia, serif" font-size="11" letter-spacing="2">THE CONDITION THAT CHANGED IN 2026</text>
  <g font-family="Georgia, serif" fill="#f4ecdb" font-size="12">
    <text x="48" y="475">Project Samara · CIRO Custody Framework · CSA Project Tokenization · Alberta Financial Innovation Act ·</text>
    <text x="48" y="494">OSFI capital treatment · published Canadian qualified custodian set · live institutional issuance.</text>
    <text x="48" y="520" fill="#8a8676" font-style="italic">The structural conditions for a credible domestic platform are now in place.</text>
  </g>

  <text x="48" y="548" fill="#5a5648" font-family="Georgia, serif" font-size="10">Source: 4orm Master Pro Forma · KCS Capital, May 2026</text>

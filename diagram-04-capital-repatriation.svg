<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 560" role="img" aria-label="Capital Repatriation - Canadian tokenization activity routing offshore vs. domestic recovery">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0d12"/>
      <stop offset="1" stop-color="#13181f"/>
    </linearGradient>
    <linearGradient id="gold4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d4a85a"/>
      <stop offset="1" stop-color="#b88a3a"/>
    </linearGradient>
    <linearGradient id="leak" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d4a85a" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#5a4623" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="recover" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5a4623" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#d4a85a" stop-opacity="0.95"/>
    </linearGradient>
  </defs>

  <rect width="880" height="560" fill="url(#bg4)"/>

  <text x="48" y="56" fill="#d4a85a" font-family="Georgia, serif" font-size="11" letter-spacing="3">KCS RESEARCH · MARKET & TAM</text>
  <text x="48" y="92" fill="#f4ecdb" font-family="Georgia, serif" font-size="26" font-weight="500">Capital Repatriation · The Offshore Leak</text>
  <text x="48" y="118" fill="#8a8676" font-family="Georgia, serif" font-size="14" font-style="italic">C$20B-$40B Canadian-origin GTV currently clearing offshore</text>

  <line x1="48" y1="138" x2="832" y2="138" stroke="#2a2f38" stroke-width="1"/>

  <!-- LEFT: CANADA -->
  <g transform="translate(60, 170)">
    <rect width="200" height="240" fill="none" stroke="url(#gold4)" stroke-width="1.5"/>
    <text x="100" y="32" fill="#d4a85a" font-family="Georgia, serif" font-size="11" text-anchor="middle" letter-spacing="3">CANADA · ORIGIN</text>
    <text x="100" y="56" fill="#f4ecdb" font-family="Georgia, serif" font-size="14" text-anchor="middle">Issuers · Assets</text>
    <line x1="20" y1="72" x2="180" y2="72" stroke="#2a2f38"/>
    <g font-family="Georgia, serif" fill="#8a8676" font-size="11">
      <text x="20" y="96">Pineapple · $13.7B mortgages</text>
      <text x="20" y="118">AuCan Gold · $2.5B bullion</text>
      <text x="20" y="140">T-RIZE · structured RE</text>
      <text x="20" y="162">Ocree Capital · exempt market</text>
      <text x="20" y="184">Crown corps · institutional debt</text>
      <text x="20" y="206">Pension funds · alternative AM</text>
      <text x="20" y="228">Corporate treasuries</text>
    </g>
  </g>

  <!-- RIGHT TOP: OFFSHORE -->
  <g transform="translate(620, 170)">
    <rect width="200" height="110" fill="none" stroke="url(#gold4)" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="100" y="28" fill="#d4a85a" font-family="Georgia, serif" font-size="11" text-anchor="middle" letter-spacing="3">OFFSHORE TODAY</text>
    <line x1="20" y1="42" x2="180" y2="42" stroke="#2a2f38"/>
    <g font-family="Georgia, serif" fill="#8a8676" font-size="11">
      <text x="20" y="62">US · Swiss · SG platforms</text>
      <text x="20" y="80">Foreign custodians</text>
      <text x="20" y="98">Non-Cdn chains · marketplaces</text>
    </g>
  </g>

  <!-- RIGHT BOTTOM: DOMESTIC 4ORM -->
  <g transform="translate(620, 300)">
    <rect width="200" height="110" fill="url(#gold4)" opacity="0.1"/>
    <rect width="200" height="110" fill="none" stroke="url(#gold4)" stroke-width="2"/>
    <text x="100" y="28" fill="#d4a85a" font-family="Georgia, serif" font-size="11" text-anchor="middle" letter-spacing="3">DOMESTIC · 4ORM</text>
    <line x1="20" y1="42" x2="180" y2="42" stroke="#2a2f38"/>
    <g font-family="Georgia, serif" fill="#f4ecdb" font-size="11">
      <text x="20" y="62">CIRO-aligned platform</text>
      <text x="20" y="80">Canadian qualified custody</text>
      <text x="20" y="98">Tokenized CAD deposits</text>
